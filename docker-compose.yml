services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: painel-investimentos-db   # nome do container
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SenhaForte123!"     # SQL Server exige senha forte
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SenhaForte123!' -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  init-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'SenhaForte123!' -Q \"IF DB_ID('painel-investimentos-db') IS NULL CREATE DATABASE [painel-investimentos-db];\" -C
      "
    restart: "no"

volumes:
  sqlserver_data:
